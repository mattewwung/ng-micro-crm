<div class="max-w-xl mx-auto">
  <div class="flex items-center gap-2 mb-6">
    <button routerLink="/" class="text-slate-400 hover:text-slate-600">← 返回</button>
    <h2 class="text-2xl font-bold text-slate-800">
      {{ isNew() ? '新增联系人' : '编辑联系人' }}
    </h2>
  </div>
  @if (isLoading()) {
    <div class="animate-pulse space-y-4">
      <div class="h-10 bg-slate-200 rounded w-full"></div>
      <div class="h-32 bg-slate-200 rounded w-full"></div>
    </div>
  } @else {
    <form #contactForm="ngForm" (ngSubmit)="save()" class="space-y-6 bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">
          姓名 <span class="text-red-500">*</span>
        </label>
        <input [(ngModel)]="formModel().name" name="name" required #nameCtrl="ngModel"
                (input)="markDirty()"
                [class.border-red-500]="nameCtrl.invalid && nameCtrl.touched"
                class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
        @if (nameCtrl.invalid && nameCtrl.touched) {
          <p class="text-red-500 text-xs mt-1">姓名为必填项</p>
        }
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">职位</label>
          <input [(ngModel)]="formModel().title" name="title" (input)="markDirty()"
                  class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">公司</label>
          <input [(ngModel)]="formModel().company" name="company" (input)="markDirty()"
                  class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">标签</label>

        <div class="flex flex-wrap gap-2 mb-3">
          @for (tag of formModel().tags; track tag) {
            <span class="inline-flex items-center gap-1 bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-sm">
              {{ tag }}
              <button type="button" (click)="removeTag(tag)" class="hover:text-indigo-900 font-bold ml-1">&times;</button>
            </span>
          }
        </div>

        <div class="flex gap-2">
          <input [(ngModel)]="newTagInput" name="newTag"
                  (keydown.enter)="addTag($event)"
                  placeholder="输入标签后按回车添加..."
                  class="flex-1 px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
          <button type="button" (click)="addTag()"
                  class="px-4 py-2 bg-slate-100 text-slate-700 rounded-lg hover:bg-slate-200 text-sm font-medium">
            添加
          </button>
        </div>
      </div>

      <div class="flex items-center justify-end gap-3 pt-6 border-t border-slate-50">
        <button type="button" routerLink="/"
                class="px-6 py-2 text-slate-600 font-medium hover:bg-slate-50 rounded-lg transition">
          取消
        </button>
        <button type="submit"
                [disabled]="!isDirty() || isSaving() || contactForm.invalid"
                class="px-6 py-2 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition">
          {{ isSaving() ? '保存中...' : '保存更改' }}
        </button>
      </div>
    </form>
  }
</div>
