<div class="flex flex-col gap-6">
  <div class="flex justify-between items-center">
    <h2 class="text-xl font-semibold text-slate-800">所有联系人 ({{ filteredContacts().length }})</h2>
    <input
      type="text"
      placeholder="搜索姓名..."
      class="px-4 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 w-64"
      (input)="updateSearch($event)"
    />
  </div>

  <div class="grid gap-4">
    @for (contact of filteredContacts(); track contact.id) {
      <app-contact-card
        [data]="contact"
        (onEdit)="handleEdit(contact.id)"
      />
    }
  </div>
</div>
